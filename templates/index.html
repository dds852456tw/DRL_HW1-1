<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HW1-1: 網格地圖開發</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }
        h1 {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .control-panel {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }
        .control-panel label {
            font-size: 18px;
            margin-right: 10px;
        }
        .control-panel input[type="number"] {
            font-size: 16px;
            width: 60px;
            margin-right: 10px;
            padding: 2px 4px;
        }
        .control-panel button {
            font-size: 16px;
            padding: 4px 10px;
            cursor: pointer;
        }
        
        #grid-info {
            display: none;
            margin-bottom: 20px;
        }
        #grid-info h2 {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        #grid-info p {
            font-size: 18px;
            margin: 10px 0;
            padding-left: 20px; /* match the indentation in the screenshot */
        }

        #grid-container {
            display: inline-flex;
            flex-direction: column;
            margin-left: 20px; /* offset matching standard padding */
        }

        .grid-row {
            display: flex;
        }

        .grid-cell {
            width: 50px;
            height: 50px;
            border: 1px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            user-select: none;
            background-color: white; /* default */
            color: black;
            box-sizing: border-box; /* ensure 50x50 with borders */
            margin-right: -1px; /* collapse borders */
            margin-bottom: -1px; /* collapse borders */
        }

        .grid-cell.start {
            background-color: green;
        }

        .grid-cell.end {
            background-color: red;
        }

        .grid-cell.obstacle {
            background-color: gray;
        }
    </style>
</head>
<body>

    <h1>Generate n x n Square</h1>
    <div class="control-panel">
        <label for="grid-size">Enter a number between 5 and 9:</label>
        <input type="number" id="grid-size" min="5" max="9" value="5">
        <button id="generate-btn">Generate Square</button>
    </div>

    <div id="grid-info">
        <h2 id="grid-title">5 x 5 Square:</h2>
        <p>1. Click on a cell to set up the start grid as green or the end grid as red.</p>
    </div>

    <div id="grid-container"></div>

    <script>
        document.getElementById('generate-btn').addEventListener('click', generateGrid);

        let startCell = null;
        let endCell = null;
        let obstacles = [];
        let maxObstacles = 0;

        function generateGrid() {
            const sizeInput = document.getElementById('grid-size').value;
            const n = parseInt(sizeInput);

            if (isNaN(n) || n < 5 || n > 9) {
                alert("Please enter a valid number between 5 and 9.");
                return;
            }

            // Update UI
            document.getElementById('grid-title').innerText = `${n} x ${n} Square:`;
            maxObstacles = n - 2;
            document.getElementById('grid-info').style.display = 'block';

            // Reset state
            startCell = null;
            endCell = null;
            obstacles = [];

            // Draw grid
            const container = document.getElementById('grid-container');
            container.innerHTML = ''; 

            let counter = 1;
            for (let r = 0; r < n; r++) {
                const row = document.createElement('div');
                row.className = 'grid-row';
                for (let c = 0; c < n; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    cell.innerText = counter;
                    cell.dataset.id = counter;
                    cell.addEventListener('click', onCellClick);
                    row.appendChild(cell);
                    counter++;
                }
                container.appendChild(row);
            }
        }

        function onCellClick(e) {
            const cell = e.target;
            const id = cell.dataset.id;

            // Handle deselection first
            if (cell.classList.contains('start')) {
                cell.classList.remove('start');
                startCell = null;
                return;
            }
            if (cell.classList.contains('end')) {
                cell.classList.remove('end');
                endCell = null;
                return;
            }
            if (cell.classList.contains('obstacle')) {
                cell.classList.remove('obstacle');
                obstacles = obstacles.filter(obs => obs !== id);
                return;
            }

            // Handle selection sequentially: start -> end -> obstacle
            if (!startCell) {
                cell.classList.add('start');
                startCell = id;
            } else if (!endCell) {
                cell.classList.add('end');
                endCell = id;
            } else if (obstacles.length < maxObstacles) {
                cell.classList.add('obstacle');
                obstacles.push(id);
            } else {
                alert(`You can only set up to ${maxObstacles} obstacles.`);
            }
        }

        // Generate default grid
        // generateGrid();
    </script>
</body>
</html>
